version: 1

sources:
  - id: palo_alto
    description: Palo Alto PAN-OS TRAFFIC/THREAT/SYSTEM CSV syslog
    source_type: palo_alto
    ingest: syslog
    enabled: true
    match:
      - type: message_contains
        pattern: ",TRAFFIC,"
      - type: message_contains
        pattern: ",THREAT,"

  - id: windows_syslogpusher
    description: Windows event logs and file tails via Syslog Pusher (RFC 5424)
    source_type: windows
    ingest: syslog
    enabled: true

  - id: generic_syslog
    description: Generic syslog with IP pairs in message body
    source_type: generic
    ingest: syslog
    enabled: true
    default: true

  - id: journal_system
    description: systemd journal (syslogb core)
    source_type: journal
    ingest: journal
    enabled: true
    uri: journal://system

  - id: syslogb_files
    description: File-based logs tailed by syslogb
    source_type: imported
    ingest: adapter
    adapter: syslogb
    base_url_env: SYSLOGB_BASE_URL
    enabled: true

  - id: loggy_archive
    description: Historical Palo Alto logs from loggy.db (read-only adapter)
    source_type: imported
    ingest: adapter
    adapter: loggy
    db_path_env: LOGGY_DB_PATH
    enabled: true

  - id: netsyslog_archive
    description: Historical geo flows from netsyslog (read-only adapter)
    source_type: imported
    ingest: adapter
    adapter: netsyslog
    db_path_env: NETSYSLOG_DB_PATH
    enabled: true

  - id: mist_cloud
    description: Juniper Mist cloud events (polled API ingest)
    source_type: mist
    ingest: poll
    adapter: mist
    base_url_env: MIST_BASE_URL
    enabled: true
