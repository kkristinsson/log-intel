# log-intel — route incoming (remote) syslog to per-sender files for syslogb
# Copy derived from syslogb/config/rsyslog/50-syslogb-incoming.conf (syslogb repo unchanged).
#
# Install on collector host when using file-bridge alongside hub ingest:
#   sudo mkdir -p /var/log/remote/hosts
#   sudo chown syslog:adm /var/log/remote /var/log/remote/hosts
#   sudo cp 50-log-intel-incoming.conf /etc/rsyslog.d/
#   sudo rsyslogd -N1 && sudo systemctl restart rsyslog
#
# syslogb (.env): LOG_DIR=/var/log/remote/hosts LOG_GLOB=*.log
# Syslog Pusher (Windows): point at this host :514 OR at log-intel hub directly

module(load="imudp")
module(load="imtcp")

input(type="imudp" port="514" address="0.0.0.0")
input(type="imtcp" port="514" address="0.0.0.0" StreamDriver.Mode="1" StreamDriver.AuthMode="anon")

template(name="LogIntelPerHost" type="string"
         string="/var/log/remote/hosts/%fromhost%.log")

template(name="LogIntelFileFormat" type="string"
         string="%timereported% %hostname% %syslogtag%%msg:::sp-if-no-1st-sp%%msg%\n")

if (
     $fromhost-ip != '127.0.0.1'
     and $fromhost-ip != '::1'
     and not ($fromhost-ip startswith '127.')
) then {
    action(
        type="omfile"
        dynaFile="LogIntelPerHost"
        template="LogIntelFileFormat"
        dirCreateMode="0755"
        fileCreateMode="0640"
        dirGroup="adm"
        fileGroup="adm"
        dirOwner="syslog"
        fileOwner="syslog"
    )
    stop
}
